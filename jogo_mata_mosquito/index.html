<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Mata mosquito!</title>

		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

		<link rel="stylesheet" href="css/style.css">

		<script>
			function startGame() {
				var level = document.getElementById('level').value

				if (level === '') {
					alert('Selecione um nivel para iniciar o jogo')
					return false
				}

				window.location.href = "app.html?" + level
			}

			function gameDuration() {
				var time = document.getElementById('time').value

				if (time === '') {
					alert('Selecione um tempo de jogo')
					return false
				}

				window.location.href = "app.html?" + time
			}

			function selectCursor() {
				var cursor = document.getElementById('cursor').value

				if (cursor === '') {
					cursor = 'raquete'
					return false
				}

				window.location.href = "app.html?" + cursor
			}
		</script>
	</head>
	<body>

		<div class="container">
			<div class="row">
				<div class="col">
					<div class="d-flex justify-content-center">
						<img src="imagens/game.png">
					</div>
				</div>
			</div>

			<div class="row">
				<div class="col">
					<div class="d-flex justify-content-center">
						<div class="mb-3">
							<select class="form-control" id="level">
								<option value="">-- Selecione a dificuldade --</option>
								<option value="facil">Facil</option>
								<option value="normal">Normal</option>
								<option value="hard">Difícil</option>
								<option value="hard_as_fuck">Difícil pra caralho</option>
							</select>

							<select class="form-control mt-2" id="time">
								<option value="">-- Selecione o tempo de jogo --</option>
								<option value="15s">15s</option>
								<option value="30s">30s</option>
								<option value="45s">45s</option>
								<option value="60s">60s</option>
							</select>

							<select class="form-control mt-2" id="cursor">
								<option value="">-- Selecione o cursor --</option>
								<option value="raquete">Raquete</option>
								<option value="mira">Mira</option>
							</select>
						</div>
					</div>
				</div>
			</div>

			<div class="row">
				<div class="col">
					<div class="d-flex justify-content-center">
						<button type="button" class="btn btn-danger btn-lg" onclick="startGame(), gameDuration(), selectCursor()">Iniciar jogo</button>
					</div>
				</div>
			</div>

		</div>

	</body>
</html>
